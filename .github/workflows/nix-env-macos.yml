# This workflow ensures that the nix dev env works on macOS (both ARM and Intel).
name: Nix env macOS

on:
  workflow_dispatch:

concurrency:
  # ensure non-PR jobs run in parallel
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_LOG: info,libp2p=off
  CARGO_INCREMENTAL: "0"

jobs:
  nix-env-macos:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Intel
            runner: macos-13
          - platform: ARM
            runner: macos-latest
    name: Nix Env macOS (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable Cachix
        uses: cachix/cachix-action@v16
        # If PR is from a non-collaborator (e. g. dependabot) the secrets are missing and the login to cachix fails.
        continue-on-error: true
        with:
          name: espresso-systems-private
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          extraPullNames: nix-community
          skipPush: ${{ github.actor == 'dependabot[bot]' }}

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # NOTE: no rust cache this isn't a time critical job

      - name: Activate nix env
        run: nix develop --accept-flake-config -c echo Ok

      - name: Check rust crates
        run: nix develop --accept-flake-config -c just check

      - name: Build contracts
        run: nix develop --accept-flake-config -c forge build
