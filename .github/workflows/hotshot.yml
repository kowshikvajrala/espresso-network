name: HotShot integration tests

on:
  push:
    branches:
      - "main"
  pull_request:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

concurrency:
  # ensure non-PR jobs run in parallel
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0"

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: taiki-e/install-action@just
      - id: set-matrix
        run: echo "matrix=$(just hotshot::matrix)" >> "$GITHUB_OUTPUT"

  test:
    needs: build-matrix
    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Checkout Repository

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        name: Enable Rust Caching
        with:
          shared-key: "hotshot-tests"
          cache-on-failure: "true"
          # Save from a hotshot-testing cell so the cache contains its dep graph:
          # every other matrix cell needs those deps. `test-ci-rest` excludes
          # hotshot-testing, so its target/ is a poor match for the rest of the
          # matrix.
          save-if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-')) && matrix.test_suites == 'test-ci tests_1' }}
          prefix-key: v2-hotshot

      - uses: taiki-e/install-action@just

      - uses: taiki-e/install-action@nextest

      - name: Show memory
        run: free -h

      - name: Build integration tests
        run: |
          just hotshot::${{ matrix.test_suites }} --no-run
        timeout-minutes: 60

      - name: Run integration tests
        run: |
          just hotshot::${{ matrix.test_suites }} --no-fail-fast
        timeout-minutes: 60
        env:
          RUST_BACKTRACE: full

      - name: Sanitize artifact name
        if: always()
        id: artifact-name
        run: |
          name="nextest-junit-hotshot-$(echo '${{ matrix.test_suites }}' | tr ' /' '--')"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          if-no-files-found: ignore
          path: target/nextest/*/junit.xml
          retention-days: 1

  test-new-protocol:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: standard
            filter: 'not test(/tests::(restarts|failures|cliquenet|memory_network)::/)'
          - name: restarts
            filter: 'test(/tests::restarts::/)'
          - name: failures
            filter: 'test(/tests::failures::/)'
          - name: network
            filter: 'test(/tests::(cliquenet|memory_network)::/)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Checkout Repository

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        name: Enable Rust Caching
        with:
          shared-key: "hotshot-tests"
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
          prefix-key: v2-hotshot

      - uses: taiki-e/install-action@nextest

      - name: Build tests
        run: |
          cargo nextest run -p hotshot-new-protocol --no-run
        timeout-minutes: 60

      - name: Run tests (${{ matrix.name }})
        run: |
          cargo nextest run -p hotshot-new-protocol --profile new-protocol --no-fail-fast --test-threads 4 -E '${{ matrix.filter }}'
        timeout-minutes: 30
        env:
          RUST_BACKTRACE: full

      - name: Upload nextest JUnit
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-junit-hotshot-new-protocol-${{ matrix.name }}
          if-no-files-found: ignore
          path: target/nextest/*/junit.xml
          retention-days: 1

  test-examples:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Checkout Repository

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        name: Enable Rust Caching
        with:
          shared-key: "hotshot-tests"
          cache-on-failure: "true"
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-') }}
          prefix-key: v2-hotshot

      - uses: taiki-e/install-action@just

      - name: Test examples
        run: |
          just hotshot::example all-push-cdn -- --config_file ./crates/hotshot/orchestrator/run-config.toml
        timeout-minutes: 20

  nextest-report:
    needs: [test, test-new-protocol]
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() }}
    # Reporter only: failures here must not fail the workflow.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download JUnit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nextest-junit-*
          path: junit-artifacts

      - name: Fetch main test stats
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/nextest-ci stats-fetch \
            --workflow hotshot.yml \
            --artifact-name test-stats-hotshot \
            --out main-test-stats.json

      - name: Render summary
        run: |
          args=(
            junit-artifacts
            --title "Nextest (hotshot)"
            --pr-comment-out junit-artifacts/pr-comment.md
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          )
          if [ -s main-test-stats.json ]; then
            args+=(--main-stats main-test-stats.json)
          fi
          python3 scripts/nextest-ci report "${args[@]}" >> "$GITHUB_STEP_SUMMARY"

      - name: Post/update PR comment
        if: ${{ github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: nextest-hotshot
          path: junit-artifacts/pr-comment.md
          delete: ${{ hashFiles('junit-artifacts/pr-comment.md') == '' }}

  publish-test-stats:
    needs: [test, test-new-protocol]
    # always() so a single flaky shard on main does not freeze the history artifact.
    if: ${{ always() && !cancelled() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    # Reporter only: failures here must not fail the workflow.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download JUnit artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nextest-junit-*
          path: junit-artifacts

      - name: Export stats
        run: |
          python3 scripts/nextest-ci stats-write \
            --junit-dir junit-artifacts \
            --sha "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --out test-stats.json

      - uses: actions/upload-artifact@v7
        with:
          name: test-stats-hotshot
          path: test-stats.json
          if-no-files-found: error
          retention-days: 90

  # This job enables having a single required status check in github for all hotshot tests.
  aggregate-hotshot-tests:
    needs: [test, test-new-protocol, test-examples]
    runs-on: ubuntu-latest
    # explicitly run and fail the job if dependencies failed
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Aggregate hotshot test results
        run: |
          # useful for debugging
          echo "All results: ${{ toJson(needs) }}"

          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "One or more jobs failed."
            exit 1
          else
            echo "All jobs succeeded."
            exit 0
          fi
