name: Security audit
on:
  push:
    branches:
      - main
      - release-*
    tags:
      # YYYYMMDD
      - "20[0-9][0-9][0-1][0-9][0-3][0-9]*"
  pull_request:
    # For PRs we only want to fail if dependencies were changed.
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  workflow_dispatch:
  # Run the audit job once a day on main.
  schedule:
    - cron: "0 0 * * *"

env:
  CARGO_INCREMENTAL: "0"

jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  audit_fix:
    needs: security_audit
    runs-on: ubuntu-latest
    # Only create fix PRs for main and manual dispatch. Release branches and
    # PRs still get the audit check but fixes should be cherry-picked from main.
    if: |
      ( github.ref == 'refs/heads/main' && failure() ) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: install cargo audit fix
        run: cargo install cargo-audit --locked --features=fix

      - name: Run cargo audit fix
        run: |
          set -o pipefail
          cat > /tmp/pr-body.txt << 'EOF'
          Changes from `cargo audit fix`.

          To trigger the CI, close and re-open the PR.

          ### cargo audit fix output:

          ```
          EOF
          cargo audit fix 2>&1 | tee -a /tmp/pr-body.txt
          echo '```' >> /tmp/pr-body.txt

      - name: Create Pull Request
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/cargo-audit
          title: "[Bot] Audit fixes"
          commit-message: Cargo audit fixes
          body-path: /tmp/pr-body.txt

